# Code Generated by Sidekick is for learning and experimentation purposes only.
trigger:
  branches:
    include:
      - master

pr:
  branches:
    include:
      - master

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: '20.x'
  runSnyk: 'false'   # set to 'true' to enable Snyk step

steps:
  - checkout: self
    clean: true

  - task: NodeTool@0
    displayName: 'Use Node.js $(nodeVersion)'
    inputs:
      versionSpec: '$(nodeVersion)'

  - script: npm ci
    displayName: 'Install dependencies'

  - script: npm test
    displayName: 'Run tests'

  - script: npm run build
    displayName: 'Build'
    condition: succeeded()

  # Optional: Snyk (requires pipeline secret variable SNYK_TOKEN)
  - bash: |
      npm i -g snyk
      snyk auth "ci-azuredevops-juice-shop-open-sourcecode"
      snyk test --severity-threshold=high
    displayName: 'Snyk: dependency scan (optional)'
    condition: and(succeeded(), eq(variables['runSnyk'], 'true'))
    env:
      SNYK_TOKEN: $(ci-azuredevops-juice-shop-open-sourcecode)
